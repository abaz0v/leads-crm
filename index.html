<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Leads CRM</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f172a;--card:#1e293b;--card2:#263348;--border:#334155;--text:#f1f5f9;--muted:#94a3b8;--accent:#3b82f6;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--radius:10px;--shadow:0 4px 24px rgba(0,0,0,.5)}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;overflow:hidden}
#s-login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e3a5f);z-index:100}
#s-login.h{display:none}
.lbox{background:var(--card);border-radius:16px;padding:36px 32px;width:min(380px,92vw);box-shadow:var(--shadow);border:1px solid var(--border)}
.lbox h1{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px;color:var(--accent)}
.lbox p{text-align:center;color:var(--muted);margin-bottom:22px;font-size:13px}
.rtabs{display:flex;gap:8px;margin-bottom:18px}
.rtab{flex:1;padding:10px;border-radius:8px;border:2px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;transition:.2s}
.rtab.on{border-color:var(--accent);background:rgba(59,130,246,.15);color:var(--accent)}
.inp{width:100%;padding:10px 13px;border-radius:8px;border:1.5px solid var(--border);background:#0f172a;color:var(--text);font-size:14px;outline:none;transition:.2s}
.inp:focus{border-color:var(--accent)}
.btn{padding:9px 15px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.btn:hover{opacity:.88}
.btn.full{width:100%;margin-top:14px;padding:12px;font-size:15px}
.btn.sm{padding:5px 12px;font-size:12px}
.btn.ghost{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn.ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn.red{background:var(--red)}
.errmsg{color:var(--red);font-size:12px;text-align:center;margin-top:8px;display:none}
/* APP */
#app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}
#app.h{display:none}
/* NAV */
.nav{background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.nav-r1{display:flex;align-items:center;padding:7px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;gap:4px}
.nav-r1::-webkit-scrollbar{display:none}
.ntab{padding:7px 12px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap;transition:.2s;flex-shrink:0}
.ntab:hover{border-color:var(--accent);color:var(--text)}
.ntab.on{border-color:var(--accent);background:rgba(59,130,246,.2);color:var(--accent)}
.nsep{width:1px;height:22px;background:var(--border);flex-shrink:0;margin:0 2px}
.nbtn{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:7px 9px;border-radius:8px;font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0;transition:.2s}
.nbtn:hover{background:var(--card2);color:var(--text)}
.nbtn.on{background:rgba(59,130,246,.2);color:var(--accent)}
.nav-r2{display:none;align-items:center;gap:6px;padding:0 10px 7px;font-size:11px;color:var(--muted)}
.nav-r2.show{display:flex}
.nav-r2 input[type=date]{background:#0f172a;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:3px 7px;font-size:11px;outline:none}
.nav-r2 input[type=date]:focus{border-color:var(--accent)}
.rbadge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:9px;font-weight:700;background:rgba(59,130,246,.2);color:var(--accent);border:1px solid rgba(59,130,246,.3);margin-left:auto}
/* CONTENT */
.content{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.view.on{display:flex}
/* SERVICE VIEW */
.svctb{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.sinp{flex:1;padding:6px 10px;border-radius:7px;border:1.5px solid var(--border);background:#0f172a;color:var(--text);font-size:12px;outline:none}
.sinp:focus{border-color:var(--accent)}
.tw{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
table{border-collapse:collapse;width:max-content;min-width:100%}
thead th{background:var(--card);position:sticky;top:0;z-index:10;padding:8px 9px;font-size:10px;font-weight:700;color:var(--muted);text-align:center;white-space:nowrap;border-bottom:2px solid var(--border);text-transform:uppercase;letter-spacing:.3px}
th.s0{position:sticky;left:0;z-index:20;min-width:90px;max-width:90px;width:90px}
th.s1{position:sticky;left:90px;z-index:20;border-right:2px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:.12s}
tbody tr:hover{background:rgba(255,255,255,.035)}
tbody tr.dup{background:rgba(234,179,8,.08)!important}
tbody tr.blk{background:rgba(239,68,68,.08)!important}
td{padding:7px 9px;text-align:center;font-size:12px;white-space:nowrap;vertical-align:middle}
td.s0{position:sticky;left:0;z-index:5;background:var(--bg);text-align:left;width:90px;max-width:90px;overflow:hidden;text-overflow:ellipsis}
td.s1{position:sticky;left:90px;z-index:5;background:var(--bg);text-align:left;border-right:2px solid var(--border);max-width:110px;overflow:hidden;text-overflow:ellipsis;font-weight:600}
tbody tr:hover td.s0,tbody tr:hover td.s1{background:#131f35}
.sp{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;border:1.5px solid}
.sp.Approved{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.12)}
.sp.False{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.12)}
.sp.Waiting{border-color:var(--yellow);color:var(--yellow);background:rgba(234,179,8,.12)}
.lgnd{display:flex;gap:12px;padding:5px 11px;background:var(--card2);border-top:1px solid var(--border);flex-shrink:0;font-size:10px;color:var(--muted)}
.ldot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:3px}
/* STRIP */
.strip{display:flex;border-top:1px solid var(--border);background:var(--card);flex-shrink:0;overflow-x:auto}
.strip::-webkit-scrollbar{display:none}
.sc{flex:1;min-width:70px;padding:7px 4px;text-align:center;border-right:1px solid var(--border);flex-shrink:0}
.sc:last-child{border-right:none}
.sv{display:block;font-size:14px;font-weight:700}
.sl{display:block;font-size:9px;color:var(--muted);margin-top:1px;text-transform:uppercase;letter-spacing:.3px}
.sv.g{color:var(--green)}.sv.y{color:var(--yellow)}.sv.r{color:var(--red)}.sv.b{color:var(--accent)}
/* TARGET BAR (manager) */
.tbar{padding:7px 12px;background:rgba(59,130,246,.1);border-top:2px solid rgba(59,130,246,.3);flex-shrink:0;display:none;align-items:center;gap:10px;font-size:12px}
.tbar.show{display:flex}
/* OGLYAD VIEW */
.og-toolbar{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.og-btn{min-width:66px;height:27px;border-radius:6px;border:1.5px solid var(--border);background:var(--card2);color:var(--muted);cursor:pointer;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;transition:.2s;user-select:none;white-space:nowrap;padding:0 6px}
.og-btn:hover{border-color:var(--accent)}
.og-btn.green{border-color:var(--green);background:rgba(34,197,94,.18);color:var(--green)}
.og-btn.yellow{border-color:var(--yellow);background:rgba(234,179,8,.18);color:var(--yellow)}
.og-btn.red{border-color:var(--red);background:rgba(239,68,68,.18);color:var(--red)}
/* STATS VIEW */
.stabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.stab{flex:1;padding:10px 6px;text-align:center;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.stab.on{color:var(--accent);border-bottom-color:var(--accent)}
.sbody{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:flex;flex-direction:column;gap:10px}
.gcard{background:linear-gradient(135deg,rgba(59,130,246,.13),rgba(139,92,246,.08));border:1px solid rgba(59,130,246,.3);border-radius:var(--radius);padding:14px}
.gcard h3{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--accent)}
.scard{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;flex-shrink:0}
.schead{display:flex;align-items:center;gap:8px;padding:10px 13px;background:var(--card2);cursor:pointer;border-bottom:1px solid var(--border)}
.schead h3{font-size:13px;font-weight:700;flex:1}
.scbody{padding:12px 13px;display:none}
.scbody.open{display:block}
.sr{display:flex;align-items:center;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border)}
.sr:last-child{border-bottom:none}
.sr .lb{color:var(--muted);font-size:12px}
.sr .vl{font-weight:600}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:11px}
.chip{background:var(--bg);border-radius:8px;padding:9px 6px;text-align:center}
.chip .n{font-size:19px;font-weight:700;display:block}
.chip .l{font-size:9px;color:var(--muted);margin-top:2px;display:block;text-transform:uppercase}
.ri2{padding:5px 9px;border-radius:6px;border:1.5px solid var(--border);background:#0f172a;color:var(--text);font-size:12px;width:90px;outline:none;text-align:center}
.ri2:focus{border-color:var(--accent)}
.exp-block{background:var(--bg);border-radius:8px;padding:10px 11px;margin:8px 0}
.exp-block .etitle{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px}
.er{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)}
.er:last-child{border-bottom:none}
.er .el{color:var(--muted)}
.dvcard{background:var(--card);border-radius:var(--radius);border:1px solid var(--border)}
.dvhead{display:flex;align-items:center;gap:7px;padding:10px 13px;cursor:pointer}
.dvhead h4{font-size:13px;font-weight:700;flex:1}
.dvbody{padding:10px 13px;border-top:1px solid var(--border);display:none}
.dvbody.open{display:block}
/* CFG VIEW */
.cbody{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.ccard{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px}
.ccard h3{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.frow.full{grid-template-columns:1fr}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase}
.fg select{padding:9px 11px;border-radius:8px;border:1.5px solid var(--border);background:#0f172a;color:var(--text);font-size:13px;outline:none}
.rrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.rrow:last-child{border-bottom:none}
.rn{flex:1;font-size:13px}
.ri{width:80px;padding:5px 7px;border-radius:6px;border:1.5px solid var(--border);background:#0f172a;color:var(--text);font-size:12px;text-align:center;outline:none}
.ri:focus{border-color:var(--accent)}
.stag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;background:var(--card2);border:1px solid var(--border);font-size:12px;font-weight:600;margin:3px}
.stag button{background:none;border:none;color:var(--red);cursor:pointer;font-size:15px;line-height:1;padding:0 2px}
.blit{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.cpnick{cursor:pointer!important}
.cpnick:hover{background:rgba(99,179,237,.12)!important;border-radius:4px}
.arch-badge{font-size:9px;background:var(--muted);color:var(--bg);padding:1px 5px;border-radius:8px;margin-left:5px}
.blit:last-child{border-bottom:none}
.blit span{flex:1}
.blit button{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px}
.ttag{display:inline-block;padding:2px 7px;border-radius:99px;font-size:8px;font-weight:700;background:rgba(59,130,246,.2);color:var(--accent);border:1px solid rgba(59,130,246,.3)}
/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;align-items:flex-end;justify-content:center}
.mov.open{display:flex}
@media(min-width:600px){.mov{align-items:center}}
.mbox{background:var(--card);border-radius:14px 14px 0 0;border:1px solid var(--border);width:100%;max-width:600px;max-height:92vh;overflow-y:auto;padding:20px 18px;box-shadow:var(--shadow)}
@media(min-width:600px){.mbox{border-radius:14px}}
.mbox h2{font-size:15px;font-weight:700;margin-bottom:14px}
.dgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
.di{display:flex;flex-direction:column;gap:3px}
.di label{font-size:9px;color:var(--muted);text-align:center;font-weight:700;text-transform:uppercase}
.di .inp{font-size:13px;padding:6px 5px;text-align:center}
.factions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
/* CTX */
.ctx{position:fixed;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);z-index:900;min-width:175px;overflow:hidden;animation:ci .1s ease}
@keyframes ci{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.ctx-i{padding:10px 15px;cursor:pointer;display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;transition:.12s}
.ctx-i:hover{background:var(--card2)}
.ccell{position:relative;cursor:context-menu}.ccell.c1{background:rgba(239,68,68,.25)}.ccell.c2{background:rgba(249,115,22,.25)}.ccell.c3{background:rgba(234,179,8,.25)}.ccell.c4{background:rgba(34,197,94,.25)}.ccell.c5{background:rgba(6,182,212,.25)}.ccell.c6{background:rgba(59,130,246,.25)}.ccell.c7{background:rgba(139,92,246,.25)}.ccell.c8{background:rgba(236,72,153,.25)}.ccell.c9{background:rgba(255,255,255,.15)}.ccell.c10{background:rgba(148,163,184,.2)}
.cpal{position:fixed;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);z-index:950;padding:8px;display:flex;gap:5px;flex-wrap:wrap;width:140px}
.cpal-dot{width:22px;height:22px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:.15s}.cpal-dot:hover{border-color:var(--text);transform:scale(1.15)}
/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:9px 16px;font-size:13px;z-index:2000;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap}
.toast.show{opacity:1}
/* HOME */
.hwrap{flex:1;overflow-y:auto;padding:18px 12px}
.hgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:9px}
.hbtn{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:16px 12px;text-align:center;cursor:pointer;transition:.2s}
.hbtn:hover{border-color:var(--accent);background:var(--card2)}
.hbtn .ic{font-size:26px;margin-bottom:7px}
.hbtn .nm{font-size:13px;font-weight:700}
.hbtn .ct{font-size:11px;color:var(--muted);margin-top:3px}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.eic{font-size:34px;margin-bottom:10px}
.fl{display:flex;align-items:center;gap:8px}
.mla{margin-left:auto}
hr.t{border:none;border-top:1px solid var(--border);margin:9px 0}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="s-login">
  <div class="lbox">
    <h1>📊 Leads CRM</h1>
    <p>Система обліку реєстрацій</p>
    <div class="rtabs">
      <button class="rtab on" onclick="selRole('admin')">👑 Адміністратор</button>
      <button class="rtab" onclick="selRole('manager')">👤 Менеджер</button>
    </div>
    <input id="lpass" class="inp" type="password" placeholder="Пароль" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn full" onclick="doLogin()">Увійти</button>
    <div id="lerr" class="errmsg">❌ Невірний пароль</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="h">
  <div class="nav">
    <div class="nav-r1" id="navr1">
      <div class="nsep" id="nsep"></div>
      <button class="nbtn" id="nav-og" onclick="goOg()">👥 Огляд</button>
      <button class="nbtn" id="nav-bl" onclick="goBl()">🚫 Чорний список</button>
      <button class="nbtn" id="nav-st" onclick="goStats()">📈 Статистика</button>
      <button class="nbtn" id="nav-cf" onclick="goCfg()">⚙️</button>
      <button class="nbtn" onclick="doLogout()">🚪</button>
    </div>
    <div class="nav-r2" id="navr2">
      <span>📅</span>
      <input type="date" id="dr-from" onchange="onDrChange()">
      <span>—</span>
      <input type="date" id="dr-to" onchange="onDrChange()">
      <button class="btn sm ghost" onclick="clearDr()" style="padding:3px 8px;font-size:11px">✕</button>
      <span id="rbadge" class="rbadge"></span>
    </div>
  </div>
  <div class="content">
    <!-- HOME -->
    <div class="view on" id="v-home">
      <div class="hwrap"><p style="color:var(--muted);font-size:12px;margin-bottom:12px">Оберіть казино або сервіс:</p>
        <div class="hgrid" id="hgrid"></div>
      </div>
    </div>
    <!-- SERVICE ENTRIES -->
    <div class="view" id="v-svc">
      <div class="svctb">
        <input class="sinp" id="ssearch" placeholder="🔍 Пошук по дропу/дроповоду..." oninput="renderSvc()">
        <button class="btn sm" onclick="openForm(null)">+ Запис</button>
      </div>
      <div class="tw"><table><thead id="shead"></thead><tbody id="sbody"></tbody></table></div>
      <div class="lgnd">
        <span><span class="ldot" style="background:var(--yellow)"></span>Дублікат ніку в цьому казино</span>
        <span><span class="ldot" style="background:var(--red)"></span>Чорний список</span>
      </div>
      <div class="strip" id="sstrip"></div>
      <div class="tbar" id="tbar"></div>
    </div>
    <!-- OGLYAD -->
    <div class="view" id="v-og">
      <div class="og-toolbar">
        <input class="sinp" id="ogsearch" placeholder="🔍 Пошук..." oninput="renderOg()">
        <span style="font-size:11px;color:var(--muted)">ПКМ на кнопці — змінити колір</span>
      </div>
      <div class="tw"><table><thead id="oghead"></thead><tbody id="ogbody"></tbody></table></div>
      <div class="strip" id="ogstrip"></div>
    </div>
    <!-- BLACKLIST -->
    <div class="view" id="v-bl">
      <div class="svctb">
        <input class="sinp" id="blsearch" placeholder="🔍 Пошук по ніку..." oninput="renderBl()">
        <button class="btn sm" onclick="addBlPrompt()">+ Додати</button>
      </div>
      <div style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:7px" id="blbody"></div>
    </div>
    <!-- STATS -->
    <div class="view" id="v-stats">
      <div class="stabs" id="stabs"></div>
      <div class="sbody" id="sbody2"></div>
    </div>
    <!-- CFG -->
    <div class="view" id="v-cfg">
      <div class="cbody" id="cbody"></div>
    </div>
  </div>
</div>

<!-- MODAL: Entry -->
<div class="mov" id="m-entry"><div class="mbox"><h2 id="mtitle">Запис</h2><div id="mbody"></div></div></div>

<!-- CTX -->
<div class="ctx" id="ctx" style="display:none"></div>
<div class="toast" id="toast"></div>

<script>
'use strict';
const G={role:null,selRole:'admin',svc:null,stab:'casino',editId:null,usdRate:41};

async function cfg(k){

  return rows.length?rows[0].value:DEF[k];
}
async function setCfg(k,v){

}
async function cfgAll(){

// ── HELPERS ──
function fmt(n){return Math.round(n||0).toLocaleString('uk-UA');}
function getDaysInRange(dr){
  if(!dr||(!dr.from&&!dr.to))return 30;
  if(!dr.from||!dr.to)return 30;
  const d=Math.round((new Date(dr.to)-new Date(dr.from))/(864e5))+1;
  return Math.max(1,d);
}
function entryDeposits(e){
  return[e.ftd,...(e.deposits||[])].filter(d=>d!==null&&d!==undefined&&d!=='').reduce((s,d)=>s+(parseFloat(d)||0),0);
}
function entryPersonnelCost(e,rates,dvOv){
  if(e.status==='False')return 0;
  // Payment-type entries store their pay directly
  if(e.dropPay!==undefined||e.dropovodPay!==undefined){
    return (e.dropovodPay||0)+(e.dropPay||0);
  }
  // Casino: rate from settings
  const hasDv=!!(e.dropovod&&e.dropovod.trim());
  if(!hasDv)return rates._nodv??200;
  const dvKey=(e.dropovod||'').toLowerCase().trim();
  if(dvOv[dvKey]&&dvOv[dvKey][e.service]!==undefined)return dvOv[dvKey][e.service];
  return rates[e.service]!==undefined?rates[e.service]:(rates._dv??400);
}
function entryExpenses(e,rates,dvOv){return entryPersonnelCost(e,rates,dvOv)+entryDeposits(e);}

// Proportional ad/sub cost for a set of entries given their date ranges
function proportionalMonthly(monthlyAmt, days){return(parseFloat(monthlyAmt)||0)/30*days;}
function fmtUsd(uah){return'$'+Math.round((uah||0)/G.usdRate).toLocaleString('uk-UA');}
function fmtBoth(uah){return'₴'+fmt(uah)+' (~'+fmtUsd(uah)+')';}
async function fetchUsdRate(){
  try{
    const r=await fetch('https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?valcode=USD&json');
    const d=await r.json();if(d&&d[0]&&d[0].rate)G.usdRate=d[0].rate;
  }catch(e){}
}

async function renderStrip(entries,svc,rates,dvOv){
  const ap=entries.filter(e=>e.status==='Approved'),wt=entries.filter(e=>e.status==='Waiting'),fl=entries.filter(e=>e.status==='False');
  const totalDep=entries.reduce((s,e)=>s+entryDeposits(e),0),avgDep=ap.length?Math.round(totalDep/ap.length):0;
  let extra='';
  if(G.role==='admin'){
    const totalExp=entries.reduce((s,e)=>s+entryExpenses(e,rates,dvOv),0);
    const cr=await cfg('casinoRates')||{},rateUSD=cr[svc]||0,rev=ap.length*rateUSD*G.usdRate,net=rev-totalExp;
    extra=`<div class="sc"><span class="sv b">₴${fmt(totalDep)}</span><span class="sl">Депозити</span></div>
      <div class="sc"><span class="sv">₴${fmt(totalExp)}</span><span class="sl">Витрати</span></div>
      ${rateUSD>0?`<div class="sc"><span class="sv g">₴${fmt(rev)}</span><span class="sl">Дохід</span></div>
      <div class="sc"><span class="sv ${net>=0?'g':'r'}">₴${fmt(net)}</span><span class="sl">Прибуток</span></div>`:''}`;
  } else {
    extra=`<div class="sc"><span class="sv b">₴${fmt(totalDep)}</span><span class="sl">Депозити</span></div>
      <div class="sc"><span class="sv b">₴${fmt(avgDep)}</span><span class="sl">Сер.депозит</span></div>`;
  }
  document.getElementById('sstrip').innerHTML=`
    <div class="sc"><span class="sv g">${ap.length}</span><span class="sl">Approved</span></div>
    <div class="sc"><span class="sv y">${wt.length}</span><span class="sl">Waiting</span></div>
    <div class="sc"><span class="sv r">${fl.length}</span><span class="sl">False</span></div>${extra}`;
  // Target bar for manager
  const tbar=document.getElementById('tbar');
  const targets=await cfg('casinoTargets')||{},tgt=targets[svc];
  if(tgt&&tgt>0){
    const rem=Math.max(0,tgt-ap.length);
    const pct=Math.min(100,Math.round(ap.length/tgt*100));
    tbar.innerHTML=`<span>🎯 Ціль: <b>${tgt}</b></span><span style="color:var(--green)">✅ ${ap.length}</span><span style="color:${rem>0?'var(--yellow)':'var(--green)'}">Залишилось: <b>${rem}</b></span><div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:var(--green);border-radius:3px"></div></div><span style="font-size:11px;color:var(--muted)">${pct}%</span>`;
    tbar.classList.add('show');
  } else {tbar.classList.remove('show');}
}

async function renderOg(){

    const dvK=pair.dv.toLowerCase().trim(),drK=pair.dr.toLowerCase().trim();

      // manual override?
      const mKey=`${dvK}|||${drK}|||${svc}`;

      if(color===undefined||color===null){
        // auto from entries
        const men=all.filter(e=>e.service===svc&&(e.dropovod||'').toLowerCase().trim()===dvK&&(e.drop||'').toLowerCase().trim()===drK);

        data-dvk="${dvK}" data-drk="${drK}" data-svc="${svc}">${lbl}</button></td>`;
    }).join('');

      <td style="position:sticky;left:0;z-index:5;background:var(--bg);max-width:100px;overflow:hidden;text-overflow:ellipsis;font-size:12px;color:var(--muted)">${pair.dv||'—'}</td>

  const {from,to}=dr;
  const fil=all.filter(e=>{if(!from&&!to)return true;const d=(e.date||'').slice(0,10);if(from&&d<from)return false;if(to&&d>to)return false;return true;});

}

  const adM=adUSD*G.usdRate,subM=subUSD*G.usdRate; // convert $ → ₴

      const ap=en.filter(e=>e.status==='Approved'),wt=en.filter(e=>e.status==='Waiting'),fl=en.filter(e=>e.status==='False');
      // Expense breakdown
      let dvCosts=0,dropCosts=0,deposits=0;
      en.forEach(e=>{

        if(e.status!=='False'){

      const rateUSD=cr[svc]||0,revenue=ap.length*rateUSD*G.usdRate; // rate in $, revenue in ₴

      </div>
      <hr class="t">
      <div class="sr" style="font-size:14px;font-weight:700"><span class="lb">🏆 Чистий прибуток</span>
        <span style="color:${gNet>=0?'var(--green)':'var(--red)'};font-size:16px;font-weight:800">${fmtBoth(gNet)}</span></div>
    </div>`;

    for(const svc of svcs){
      const s=svcData[svc],dr=casinoDR[svc]||{from:'',to:''},nc=s.net>=0?'var(--green)':'var(--red)';
      const drLabel=dr.from&&dr.to?`${dr.from.slice(5)}–${dr.to.slice(5)} (${s.days}дн.)`:`Весь час`;
      html+=`<div class="scard">
        <div class="schead" onclick="toggleSCard('${svc}')">
          <h3>${svc} <span class="ttag">${types[svc]||'casino'}</span></h3>
          <span style="font-size:11px;color:var(--muted)">${drLabel} · ${s.en.length} зап.</span>
          <span style="color:var(--muted);margin-left:8px;font-size:12px" id="arr-${svc}">▾</span>
        </div>
        <div class="scbody" id="scb-${svc}">
          <div class="sgrid">
            <div class="chip"><span class="n" style="color:var(--green)">${s.ap}</span><span class="l">Approved</span></div>
            <div class="chip"><span class="n" style="color:var(--yellow)">${s.wt}</span><span class="l">Waiting</span></div>
            <div class="chip"><span class="n" style="color:var(--red)">${s.fl}</span><span class="l">False</span></div>
          </div>
          <div class="exp-block">
            <div class="etitle">💸 Розбивка витрат</div>
            <div class="er"><span class="el">👥 Витрати на дроповодів</span><span>${fmtBoth(s.dvCosts)}</span></div>
            <div class="er"><span class="el">👤 Виплати дропам</span><span>${fmtBoth(s.dropCosts)}</span></div>
            <div class="er"><span class="el">🎰 Депозити (всі записи)</span><span>${fmtBoth(s.deposits)}</span></div>
            <div class="er" style="font-weight:700;color:var(--text)"><span class="el" style="color:var(--text)">Разом витрати</span><span>${fmtBoth(s.totalExp)}</span></div>
          </div>

          <div class="sr">
            <span class="lb">🏦 Ставка ($/approved)</span>
            <span class="vl fl" style="gap:5px"><span style="color:var(--muted);font-size:12px">$</span><input class="ri2" type="number" value="${s.rateUSD}" placeholder="0"
              onchange="saveRate('${svc}',this.value)" style="width:75px"> <span style="color:var(--muted);font-size:11px">× ${s.ap} = ${fmtBoth(s.revenue)}</span></span>
          </div>

          <div class="sr" style="font-weight:700"><span class="lb">🏆 Чистий прибуток</span><span style="color:${nc}">${fmtBoth(s.net)}</span></div>
          <hr class="t">

            <span class="lb">🎯 Ціль лідів</span>

              onchange="saveTarget('${svc}',this.value)">

function toggleSCard(svc){
  const body=document.getElementById('scb-'+svc);const arr=document.getElementById('arr-'+svc);
  if(!body)return;
  const wasOpen=body.classList.contains('open');
  // Close all other open cards first
  document.querySelectorAll('.scbody.open').forEach(el=>{
    if(el!==body){
      el.classList.remove('open');
      const a=document.getElementById('arr-'+el.id.replace('scb-',''));
      if(a)a.textContent='▾';
    }
  });
  // Toggle this card
  if(wasOpen){
    body.classList.remove('open');
    if(arr)arr.textContent='▾';
  } else {
    body.classList.add('open');
    if(arr)arr.textContent='▴';
    setTimeout(()=>{
      const card=body.closest('.scard');
      const sb=document.getElementById('sbody2');
      if(card&&sb){
        card.scrollIntoView({block:'start',behavior:'smooth'});
      }
    },60);
  }
}

async function saveEntry(){
  const types=await cfg('svcTypes'),svc=G.svc,type=types[svc]||'casino';
  const date=document.getElementById('fd').value,time=document.getElementById('ft').value;
  const dv=document.getElementById('fdv').value.trim(),dr=document.getElementById('fdr').value.trim();
  const st=document.getElementById('fst').value;
  if(!dr){showToast('❌ Введіть нік дропа');return;}
  const bl=await db.all('blacklist');
  if(bl.some(b=>(b.username||'').toLowerCase().trim()===dr.toLowerCase().trim())){showToast('🚫 Нік у чорному списку!');return;}
  let obj={service:svc,date,time,dropovod:dv,drop:dr,status:st,createdAt:new Date().toISOString()};
  if(type==='payment'||type==='paysera'||type==='banking'){
    obj.telephone=document.getElementById('ftel').value.trim();
    obj.mail=document.getElementById('fmail').value.trim();
    obj.password=document.getElementById('fpwd')?document.getElementById('fpwd').value.trim():'';
    obj.pin=document.getElementById('fpin')?document.getElementById('fpin').value.trim():'';
    const _pd=parseFloat(await cfg('payDrop'))||400,_pDv=parseFloat(await cfg('payDv'))||400;
    obj.dropovodPay=dv?_pDv:0;
    obj.dropPay=(!dv&&dr)?_pd:0; // pay drop only when no dropovod
    obj.waitUntil=document.getElementById('fwu').value;
    obj.ftd=null;obj.deposits=[];
  } else {
    obj.accountId=document.getElementById('faid').value.trim();
    const v0=document.getElementById('fd0').value;obj.ftd=v0!==''?parseFloat(v0)||0:null;
    const deps=[];for(let i=1;i<=7;i++){const v=document.getElementById(`fd${i}`).value;deps.push(v!==''?parseFloat(v)||0:null);}
    obj.deposits=deps;
  }
  if(G.editId){obj.id=G.editId;await db.put('entries',obj);}else await db.add('entries',obj);
  closeM();renderSvc();showToast('✅ Збережено');
}

    if(!it)return`<div style="height:1px;background:var(--border);margin:3px 0"></div>`;

    return`<div class="ctx-i" style="color:${it.c}" onclick="ctxDo(${i})">${it.l}</div>`;
  }).join('');
  m.style.display='block';
  m.style.left=Math.min(x,window.innerWidth-190)+'px';
  m.style.top=Math.min(y,window.innerHeight-items.length*44-20)+'px';
}
function ctxDo(i){const m=document.getElementById('ctx');if(m._a[i])m._a[i]();closeCtx();}

async function savePasswords(){
  await setCfg('adminPass',document.getElementById('sap').value);
  await setCfg('managerPass',document.getElementById('smp').value);
  showToast('✅ Паролі збережено');
}

async function saveRates(){
  const rates={};
  rates._nodv=parseFloat(document.getElementById('rnodv').value)||200;
  rates._dv=parseFloat(document.getElementById('rdv').value)||400;
  document.querySelectorAll('.rs').forEach(inp=>{rates[inp.dataset.svc]=parseFloat(inp.value)||0;});
  await setCfg('expRates',rates);
  const pdEl=document.getElementById('rpayd'),pdvEl=document.getElementById('rpaydv');
  if(pdEl)await setCfg('payDrop',parseFloat(pdEl.value)||400);
  if(pdvEl)await setCfg('payDv',parseFloat(pdvEl.value)||400);
  showToast('✅ Ставки збережено');
}

async function saveOv(){
  const dvOv=await cfg('dvOverrides')||{};
  document.querySelectorAll('.ov-inp').forEach(inp=>{
    const dv=inp.dataset.dv,svc=inp.dataset.svc,key=dv.toLowerCase();
    if(!dvOv[key])dvOv[key]={};
    if(inp.value!=='')dvOv[key][svc]=parseFloat(inp.value)||0;
    else delete dvOv[key][svc];
  });
  await setCfg('dvOverrides',dvOv);
  showToast('✅ Індивідуальні ставки збережено');
}

async function addSvc(){
  const name=document.getElementById('nsn').value.trim(),type=document.getElementById('nst').value;
  if(!name)return showToast('❌ Введіть назву');
  const svcs=await cfg('services'),types=await cfg('svcTypes')||{};
  if(!svcs.includes(name)){svcs.push(name);await setCfg('services',svcs);}
  types[name]=type;await setCfg('svcTypes',types);
  document.getElementById('nsn').value='';
  await buildNav();renderCfg();showToast('✅ Сервіс додано');
}

async function removeSvc(svc){
  if(!confirm(`Видалити сервіс "${svc}"?`))return;
  const svcs=(await cfg('services')).filter(s=>s!==svc);
  await setCfg('services',svcs);
  await buildNav();renderCfg();showToast('🗑 Видалено');
}

async function addBl(){
  const v=document.getElementById('newbl').value.trim();
  if(!v)return;
  await db.add('blacklist',{username:v.toLowerCase()});
  document.getElementById('newbl').value='';
  renderCfg();showToast('\U0001f6ab Додано до чорного списку');
}

async function removeBl(id){
  await db.del('blacklist',id);
  if(document.getElementById('v-bl').classList.contains('on'))renderBl();
  else renderCfg();
  showToast('✅ Видалено з чорного списку');
}

async function exportData(){
  const entries=await db.all('entries'),bl=await db.all('blacklist');
  const settings={};for(const k of Object.keys(DEF))settings[k]=await cfg(k);
  const data=JSON.stringify({entries,blacklist:bl,settings},null,2);
  const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(data);
  a.download='leads-crm-backup.json';a.click();
  showToast('\U0001f4e5 Експортовано');
}

async function doImport(inp){
  const f=inp.files[0];if(!f)return;
  const text=await f.text();
  try{
    const data=JSON.parse(text);
    if(data.entries){for(const e of data.entries){const {id,...rest}=e;try{await db.add('entries',rest);}catch(x){await db.put('entries',e);}}}
    if(data.settings){for(const[k,v]of Object.entries(data.settings))await setCfg(k,v);}
    if(data.blacklist){for(const b of data.blacklist){const{id,...rest}=b;try{await db.add('blacklist',rest);}catch(x){}}}
    showToast('✅ Імпортовано');renderCfg();
  }catch(e){showToast('❌ Помилка імпорту');}
  inp.value='';
}

const CPAL_COLORS=[
  {cls:'c1',bg:'#ef4444'},{cls:'c2',bg:'#f97316'},{cls:'c3',bg:'#eab308'},
  {cls:'c4',bg:'#22c55e'},{cls:'c5',bg:'#06b6d4'},{cls:'c6',bg:'#3b82f6'},
  {cls:'c7',bg:'#8b5cf6'},{cls:'c8',bg:'#ec4899'},{cls:'c9',bg:'#ffffff'},
  {cls:'c10',bg:'#94a3b8'}
];
let _cpal=null;
async function cellCtx(ev,id,field){
  ev.preventDefault();ev.stopPropagation();
  if(_cpal){_cpal.remove();_cpal=null;}
  const e=await db.get('entries',id);if(!e)return;
  const cc=e.cellColors||{};
  const pal=document.createElement('div');
  pal.className='cpal';_cpal=pal;
  CPAL_COLORS.forEach(({cls,bg})=>{
    const d=document.createElement('div');
    d.className='cpal-dot'+(cc[field]===cls?' selected':'');
    d.style.background=bg;
    d.onclick=async()=>{
      cc[field]=(cc[field]===cls)?'':cls;
      e.cellColors=cc;await db.put('entries',e);
      pal.remove();_cpal=null;renderSvc();
    };
    pal.appendChild(d);
  });
  // Clear button
  const clr=document.createElement('div');
  clr.className='cpal-dot';clr.title='Без кольору';
  clr.style.background='transparent';clr.style.border='2px dashed var(--muted)';
  clr.onclick=async()=>{delete cc[field];e.cellColors=cc;await db.put('entries',e);pal.remove();_cpal=null;renderSvc();};
  pal.appendChild(clr);
  pal.style.left=Math.min(ev.clientX,window.innerWidth-150)+'px';
  pal.style.top=Math.min(ev.clientY,window.innerHeight-80)+'px';
  document.body.appendChild(pal);
}
document.addEventListener('click',e=>{if(_cpal&&!_cpal.contains(e.target)){_cpal.remove();_cpal=null;}});

function closeM(){document.getElementById('m-entry').classList.remove('open');}

let _toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>t.classList.remove('show'),2200);

let _lpTimer=null;
document.addEventListener('touchstart',e=>{
  const tgt=e.target.closest('[oncontextmenu]');if(!tgt)return;

    const te=e.touches[0];
    const me=new MouseEvent('contextmenu',{bubbles:true,cancelable:true,clientX:te.clientX,clientY:te.clientY});
    tgt.dispatchEvent(me);

document.addEventListener('touchend',()=>{clearTimeout(_lpTimer);_lpTimer=null;},{passive:true});

// ── MOBILE: hide nav-r1 on scroll down in table ──
(function(){
  let _lastY=0,_navUp=false,_timer=null;
  function applyNav(hide){
    const nr=document.getElementById('navr1');
    if(!nr||_navUp===hide)return;
    _navUp=hide;
    nr.style.display=hide?'none':'flex';
  }
  function onTWScroll(){
    const tw=document.querySelector('.tw');if(!tw)return;
    const y=tw.scrollTop;
    if(y>_lastY+8&&y>50) applyNav(true);
    else if(y<_lastY-8) applyNav(false);
    _lastY=y;
  }
  function attachTW(){
    const tw=document.querySelector('.tw');
    if(tw){tw.addEventListener('scroll',onTWScroll,{passive:true});}
    else{setTimeout(attachTW,600);}
  }
  attachTW();
  // Also re-attach after view changes (tab switches)
  document.addEventListener('click',()=>{setTimeout(attachTW,400);},{passive:true});
})();

// ── EXCEL EXPORT ──
async function exportExcel(){
  if(typeof XLSX==='undefined'){showToast('❌ XLSX не завантажено');return;}
  const all=(await db.all('entries')).filter(e=>!e.archived);
  const types=await cfg('svcTypes')||{};
  const svcs=[...new Set(all.map(e=>e.service))];
  const wb=XLSX.utils.book_new();

  for(const svc of svcs){
    const entries=all.filter(e=>e.service===svc);
    const type=types[svc]||'casino';
    let rows;
    if(type==='payment'||type==='paysera'||type==='banking'){
      rows=entries.map(e=>({
        'Дата':e.date||'',
        'Час':e.time||'',
        'Дроповод':e.dropovod||'',
        'Дроп':e.drop||'',
        'Телефон':e.telephone||'',
        'Email':e.mail||'',
        'Пароль':e.password||'',
        'Пін':e.pin||'',
        'Оплата ДРВ':e.dropovodPay||0,
        'Оплата Дроп':e.dropPay||0,
        'Відлежка':e.waitUntil||'',
        'Статус':e.status||'Waiting'
      }));
    } else {
      rows=entries.map(e=>{
        const deps=e.deposits||[];
        return{
          'Дата':e.date||'',
          'Час':e.time||'',
          'Дроповод':e.dropovod||'',
          'Дроп':e.drop||'',
          'ID':e.accountId||'',
          'FTD':e.ftd??'',
          'D1':deps[0]??'','D2':deps[1]??'','D3':deps[2]??'',
          'D4':deps[3]??'','D5':deps[4]??'','D6':deps[5]??'','D7':deps[6]??'',
          'Статус':e.status||'Waiting'
        };
      });
    }
    if(rows.length===0)continue;
    const ws=XLSX.utils.json_to_sheet(rows);
    // Auto column widths
    const cols=Object.keys(rows[0]).map(k=>({wch:Math.max(k.length,12)}));
    ws['!cols']=cols;
    const sheetName=svc.slice(0,31);
    XLSX.utils.book_append_sheet(wb,ws,sheetName);
  }

  if(wb.SheetNames.length===0){showToast('❌ Немає даних для експорту');return;}
  const today=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`leads-${today}.xlsx`);
  showToast('📊 Excel експортовано!');
}


// ── REAL-TIME SYNC (Supabase Realtime) ──
function refreshCurrentView(){
  try{
    if(document.getElementById('v-svc')&&document.getElementById('v-svc').classList.contains('on')) renderSvc();
    else if(document.getElementById('v-stats')&&document.getElementById('v-stats').classList.contains('on')) renderStats();
    else if(document.getElementById('v-bl')&&document.getElementById('v-bl').classList.contains('on')) renderBl();
  }catch(e){}
}

function initRealtime(){
  let ws=null,hb=null,retryT=null;
  function connect(){
    try{
      ws=new WebSocket('wss://iojrkwpdomtcizsbyhio.supabase.co/realtime/v1/websocket?apikey='+_SB_KEY+'&vsn=1.0.0');
      ws.onopen=()=>{
        ws.send(JSON.stringify({
          topic:'realtime:db',event:'phx_join',
          payload:{config:{postgres_changes:[
            {event:'*',schema:'public',table:'entries'},
            {event:'*',schema:'public',table:'settings'},
            {event:'*',schema:'public',table:'blacklist'}
          ]}},ref:'1'
        }));
        hb=setInterval(()=>{
          if(ws.readyState===1)ws.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:String(Date.now())}));
        },25000);
      };
      ws.onmessage=e=>{
        try{
          const msg=JSON.parse(e.data);
          if(msg.event==='postgres_changes'&&msg.payload&&msg.payload.data){
            setTimeout(refreshCurrentView,200);
          }
        }catch(ex){}
      };
      ws.onerror=()=>{ws.close();};
      ws.onclose=()=>{
        clearInterval(hb);
        retryT=setTimeout(connect,5000);
      };
    }catch(ex){retryT=setTimeout(connect,8000);}
  }
  connect();
}

// Polling fallback (every 12s) for settings changes (rate, ставка etc.)
let _pollHash='';
async function pollSync(){
  try{
    const r=await _sbFetch('entries?select=id&order=id.desc&limit=1&created_at=not.is.null')||[];
    const s=await _sbFetch('settings?select=key,value&key=eq._ts')||[];
    const h=JSON.stringify(r)+JSON.stringify(s);
    if(_pollHash&&h!==_pollHash) refreshCurrentView();
    _pollHash=h;
  }catch(ex){}
}

async function init(){
  await fetchUsdRate();
  await seedBlacklist();
  initRealtime();
  setInterval(pollSync,12000);
  if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
}
init();
